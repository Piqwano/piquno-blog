<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts — Piquno</title>
    <meta name="description" content="Japan skiing articles, snow reports, resort guides, gear reviews and travel tips.">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--snow:#f7f8fa;--ink:#1a1d23;--slate:#4a4e57;--mist:#8b919d;--ice:#c5d0e0;--accent:#2e6fb5;--accent-light:#e8f0fb}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Source Sans 3',sans-serif;background:var(--snow);color:var(--ink);line-height:1.7;font-weight:400}
        nav{border-bottom:1px solid rgba(0,0,0,.06);background:#fff;position:sticky;top:0;z-index:100}nav ul{list-style:none;display:flex;gap:2rem;max-width:780px;margin:0 auto;padding:.85rem 1.5rem;font-size:.82rem;font-weight:500;letter-spacing:.03em}nav a{color:var(--slate);text-decoration:none;transition:color .2s}nav a:hover,nav a.active{color:var(--accent)}
        main{max-width:780px;margin:0 auto;padding:3rem 1.5rem 5rem}
        .page-title{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,2.4rem);font-weight:400;margin-bottom:0.5rem}
        .page-desc{color:var(--mist);font-size:1rem;font-weight:300;margin-bottom:2rem}
        .post-list{display:flex;flex-direction:column}
        .post-card{display:block;padding:1.8rem 0;border-bottom:1px solid rgba(0,0,0,0.06);text-decoration:none;color:inherit;transition:background 0.2s}.post-card:first-child{padding-top:0}.post-card:hover{background:rgba(46,111,181,0.02)}
        .post-meta{display:flex;gap:1rem;align-items:center;margin-bottom:0.5rem}
        .post-date{font-size:.78rem;color:var(--mist);font-weight:500}
        .post-tag{font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:.15rem .55rem;border-radius:2px;background:var(--accent-light);color:var(--accent)}
        .post-tag.snow-report{background:#e6f4ea;color:#1a7c38}.post-tag.gear{background:#fef3e8;color:#b5651d}
        .post-title{font-family:'DM Serif Display',serif;font-size:1.4rem;line-height:1.3;margin-bottom:0.4rem;font-weight:400}
        .post-excerpt{color:var(--slate);font-size:.95rem;font-weight:300;line-height:1.65}
        .empty{text-align:center;padding:4rem 1rem;color:var(--mist)}.empty p{font-size:1rem;font-weight:300}
        .filter-pills{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem}
        .filter-pill{font-size:.82rem;padding:.4rem .85rem;border-radius:20px;border:1px solid rgba(0,0,0,0.1);background:white;color:var(--slate);text-decoration:none;font-weight:500;transition:all 0.2s;cursor:pointer}
        .filter-pill:hover,.filter-pill.active{background:var(--accent);color:white;border-color:var(--accent)}
        footer{border-top:1px solid rgba(0,0,0,.06);padding:2.5rem 1.5rem;text-align:center;font-size:.8rem;color:var(--mist)}footer a{color:var(--slate)}
        @media(max-width:600px){main{padding:2rem 1.25rem 4rem}nav ul{gap:1.2rem;font-size:.78rem;padding:.75rem 1.25rem}}
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Latest</a></li>
            <li><a href="/tags/snow-report" id="nav-snow-report">Snow Reports</a></li>
            <li><a href="/tags/resort-guide" id="nav-resort-guide">Resorts</a></li>
            <li><a href="/tags/gear" id="nav-gear">Gear</a></li>
            <li><a href="/tags/travel" id="nav-travel">Travel</a></li>
            <li><a href="/about">About</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="page-title" id="page-title">All Posts</h1>
        <p class="page-desc" id="page-desc">Browse all articles.</p>

        <div class="filter-pills" id="filter-pills">
            <a class="filter-pill" href="/tags/snow-report">Snow Reports</a>
            <a class="filter-pill" href="/tags/resort-guide">Resorts</a>
            <a class="filter-pill" href="/tags/gear">Gear</a>
            <a class="filter-pill" href="/tags/travel">Travel</a>
            <a class="filter-pill" href="/tags/culture">Culture</a>
            <a class="filter-pill" href="/tags/planning">Planning</a>
        </div>

        <div class="post-list" id="post-list"></div>
        <div class="empty" id="empty" style="display:none">
            <p>No posts in this category yet. Check back soon.</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Piquno. Built with snow and caffeine in Melbourne.<br>
        <a href="/">Home</a> · <a href="/feed.xml">RSS</a></p>
    </footer>

    <script>
        const TAG_MAP = {
            'snow-report': { title: 'Snow Reports', desc: 'Daily conditions across every Japan ski region.', match: 'Snow Report' },
            'resort-guide': { title: 'Resort Guides', desc: 'Deep dives into Japan\'s best ski resorts.', match: 'Resort Guide' },
            'gear': { title: 'Gear', desc: 'Ski gear reviews and recommendations for Japan conditions.', match: 'Gear' },
            'travel': { title: 'Travel', desc: 'Trip planning, flights, transport, and budgeting for Japan ski trips.', match: 'Travel' },
            'culture': { title: 'Culture', desc: 'Onsen, food, and the cultural side of skiing Japan.', match: 'Culture' },
            'planning': { title: 'Planning', desc: 'Everything you need to plan your Japan ski trip.', match: 'Planning' },
        };

        // Get tag from URL
        const path = window.location.pathname;
        const tagSlug = path.split('/tags/')[1]?.replace(/\/$/, '') || '';
        const tagInfo = TAG_MAP[tagSlug];

        if (tagInfo) {
            document.getElementById('page-title').textContent = tagInfo.title;
            document.getElementById('page-desc').textContent = tagInfo.desc;
            document.title = `${tagInfo.title} — Piquno`;

            // Highlight active nav
            const navLink = document.getElementById(`nav-${tagSlug}`);
            if (navLink) navLink.classList.add('active');

            // Highlight active pill
            document.querySelectorAll('.filter-pill').forEach(pill => {
                if (pill.getAttribute('href') === `/tags/${tagSlug}`) {
                    pill.classList.add('active');
                }
            });
        }

        async function loadPosts() {
            try {
                const res = await fetch('/posts/index.json');
                if (!res.ok) return;
                let posts = await res.json();

                // Filter by tag if on a tag page
                if (tagInfo) {
                    posts = posts.filter(p => p.tag === tagInfo.match);
                }

                if (!posts.length) {
                    document.getElementById('empty').style.display = 'block';
                    return;
                }

                const list = document.getElementById('post-list');
                list.innerHTML = posts.map(p => `
                    <a class="post-card" href="/posts/${p.slug}.html">
                        <div class="post-meta">
                            <span class="post-date">${new Date(p.date).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
                            <span class="post-tag ${p.tag === 'Snow Report' ? 'snow-report' : p.tag === 'Gear' ? 'gear' : ''}">${p.tag}</span>
                        </div>
                        <div class="post-title">${p.title}</div>
                        <div class="post-excerpt">${p.excerpt}</div>
                    </a>
                `).join('');
            } catch (e) {
                document.getElementById('empty').style.display = 'block';
            }
        }
        loadPosts();
    </script>
</body>
</html>
